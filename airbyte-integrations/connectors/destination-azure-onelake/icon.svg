<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <!-- Microsoft Fabric / OneLake logo inspired icon -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0078D4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#005A9E;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#50E6FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0078D4;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Base diamond shape -->
  <polygon points="48,8 88,48 48,88 8,48" fill="url(#grad1)" />
  <!-- Inner lake shape -->
  <polygon points="48,24 72,48 48,72 24,48" fill="url(#grad2)" opacity="0.85" />
  <!-- Center accent -->
  <circle cx="48" cy="48" r="8" fill="#ffffff" opacity="0.9" />
</svg>
